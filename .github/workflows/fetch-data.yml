name: Fetch solar data

# 排程時間用 UTC。台灣時間(UTC+8)06:00-19:00 换算成 UTC 是前一天 22:00 到當天 11:00。
# 這剛好對應原網站自己的更新邏輯(只在白天 6-19 點才重新抓資料)。
# 每 15 分鐘跑一次,若那次抓取失敗,scrape.py 內部會自己重試(見 scripts/scrape.py)。
on:
  schedule:
    - cron: "*/15 22-23,0-11 * * *"
  workflow_dispatch: {}  # 允許在 GitHub 網頁上手動按「Run workflow」測試

permissions:
  contents: write

concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper (with internal retry/backoff)
        run: python scripts/scrape.py

      - name: Commit updated data.json if changed
        run: |
          git config user.name "solar-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "data.json 沒有變化,不需要 commit"
          else
            git add data.json
            git commit -m "chore: update solar data ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
            git push
          fi
